name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: wasm/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "25.6.1"
          cache: "npm"

      - name: Install Chromium
        run: sudo apt-get install -y chromium-browser

      - run: make test-go

      - run: make install

      - run: make build-wasm

      - run: make test-js

      - run: make typecheck

      - run: make lint
